name: Auto Deploy Laravel with Bore

on:
  workflow_dispatch:  # اجرای دستی

jobs:
  auto-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    # 1. دریافت کد
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. نصب PHP 8.4 و ابزارها
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'   # مطابق composer.json
        extensions: mbstring, pdo, pdo_mysql, pdo_sqlite, sqlite3, zip, fileinfo
        tools: composer
        coverage: none

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor/
        key: composer-${{ hashFiles('composer.lock') }}
        restore-keys: composer-

    # 3. نصب وابستگی‌های Composer
    - name: Install Composer dependencies
      run: |
        composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
        composer dump-autoload -o

    # 4. نصب Node.js و کش npm (در صورت وجود package.json)
    - name: Setup Node.js
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Cache npm dependencies
      if: hashFiles('package.json') != ''
      uses: actions/cache@v4
      with:
        path: node_modules/
        key: npm-${{ hashFiles('package-lock.json') }}
        restore-keys: npm-

    - name: Install NPM dependencies & build assets
      if: hashFiles('package.json') != ''
      run: |
        npm ci --no-audit --no-fund   # در صورت نداشتن package-lock.json از npm install استفاده کنید
        npm run build                 # کامپایل assets با Vite

    # 5. ایجاد دیتابیس SQLite
    - name: Setup database
      run: |
        mkdir -p database
        touch database/database.sqlite
        chmod 777 database/database.sqlite

    # 6. ساخت فایل env با پیکربندی صحیح برای SQLite و نام برنامه
    - name: Create .env file
      id: create_env
      run: |
        cp .env.example .env
        # تنظیم نام برنامه (با استفاده از متغیر موقت برای امنیت بیشتر)
        if grep -q "^APP_NAME=" .env; then
          sed -i 's/^APP_NAME=.*/APP_NAME="کاخ موراکو"/' .env
        else
          echo 'APP_NAME="کاخ موراکو"' >> .env
        fi
        
        # اصلاح مقادیر دیتابیس
        sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
        sed -i 's|^DB_DATABASE=.*|DB_DATABASE='"$(pwd)/database/database.sqlite"'|' .env
        
        # تنظیمات دیباگ و بهینه‌سازی
        sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
        
        # تنظیمات فشرده‌سازی و حذف کامنت
        # بررسی وجود کلیدها و تغییر مقدار آن‌ها
        sed -i 's/^REMOVE_HTML_COMMENTS=.*/REMOVE_HTML_COMMENTS=true/' .env
        sed -i 's/^OPTIMIZE_HTML_MINIFY=.*/OPTIMIZE_HTML_MINIFY=false/' .env
        
        # اطمینان از وجود APP_URL
        if ! grep -q "^APP_URL=" .env; then echo "APP_URL=http://localhost:8080" >> .env; fi

        # تنظیم زبان پیش‌فرض به فارسی
        # APP_LOCALE
        if grep -q "^APP_LOCALE=" .env; then
          sed -i 's/^APP_LOCALE=.*/APP_LOCALE=fa/' .env
        else
          echo 'APP_LOCALE=fa' >> .env
        fi
        
        # APP_FALLBACK_LOCALE
        if grep -q "^APP_FALLBACK_LOCALE=" .env; then
          sed -i 's/^APP_FALLBACK_LOCALE=.*/APP_FALLBACK_LOCALE=fa/' .env
        else
          echo 'APP_FALLBACK_LOCALE=fa' >> .env
        fi
        
        # APP_FAKER_LOCALE
        if grep -q "^APP_FAKER_LOCALE=" .env; then
          sed -i 's/^APP_FAKER_LOCALE=.*/APP_FAKER_LOCALE=fa_IR/' .env
        else
          echo 'APP_FAKER_LOCALE=fa_IR' >> .env
        fi
    # 7. تولید کلید اپلیکیشن
    - name: Generate application key
      run: php artisan key:generate --force

    # 8. اجرای مایگریشن‌ها
    - name: Run migrations
      run: php artisan migrate --force --no-interaction

    # 9. ایجاد استوریج لینک
    - name: Create storage link
      run: php artisan storage:link || true

    # 10. نصب ابزار Bore
    - name: Install Bore
      run: |
        VERSION="0.6.0"
        curl -L "https://github.com/ekzhang/bore/releases/download/v$VERSION/bore-v$VERSION-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
        tar -xzf bore.tar.gz
        chmod +x bore

    # 11. اجرای سرور لاراول در پس‌زمینه
    - name: Start Laravel server
      run: |
        pkill -f "php artisan serve" || true
        # اجرای سرور با خروجی شفاف‌تر
        nohup php artisan serve --host=0.0.0.0 --port=8080 --no-reload > server.log 2>&1 &
        
        echo "⏳ در انتظار بالا آمدن سرور..."
        sleep 5
        
        # بررسی دیباگ: آیا پروسه هنوز زنده است؟
        if pgrep -f "php artisan serve" > /dev/null; then
          echo "✅ سرور لاراول با موفقیت در پس‌زمینه اجرا شد."
        else
          echo "❌ خطا: سرور لاراول اجرا نشد! محتوای server.log:"
          cat server.log
          exit 1
        fi
        
        # بررسی پورت
        echo "DEBUG: وضعیت پورت 8080:"
        netstat -tuln | grep 8080 || echo "⚠️ هشدار: هیچ پروسه‌ای روی 8080 گوش نمی‌دهد!"

    # 12. اتصال به Bore و دریافت پورت تصادفی
    - name: Expose with Bore
      id: bore_expose
      run: |
        ./bore local 8080 --to bore.pub > bore.log 2>&1 &
        
        echo "⏳ در انتظار دریافت پورت از bore..."
        
        REMOTE_PORT=""
        for i in {1..15}; do
          sleep 4
          
          # دیباگ: نمایش آخرین خط از لاگ
          LAST_LINE=$(tail -1 bore.log)
          echo "DEBUG (Iteration $i): Last line of bore.log: '$LAST_LINE'"
          
          # استخراج پورت
          REMOTE_PORT=$(echo "$LAST_LINE" | grep "listening at bore.pub:" | sed 's/.*bore.pub:\([0-9]*\).*/\1/')
          
          echo "DEBUG (Iteration $i): Extracted port: '$REMOTE_PORT'"
          
          if [ -n "$REMOTE_PORT" ] && [[ "$REMOTE_PORT" =~ ^[0-9]+$ ]]; then
            break
          fi
        done

        if [ -z "$REMOTE_PORT" ]; then
          echo "❌ خطا: پورت پیدا نشد!"
          echo "--- ALL LOGS ---"
          cat bore.log
          exit 1
        fi

        echo "REMOTE_PORT=$REMOTE_PORT" >> $GITHUB_ENV
        echo "REMOTE_URL=http://bore.pub:$REMOTE_PORT" >> $GITHUB_ENV
        echo "url=http://bore.pub:$REMOTE_PORT" >> $GITHUB_OUTPUT
        echo "✅ پورت اختصاص‌یافته: $REMOTE_PORT"

    # 13. بروزرسانی و پاکسازی کش
    - name: Update .env and Clear Cache
      run: |
        sed -i "s|^APP_URL=.*|APP_URL=$REMOTE_URL|g" .env
        php artisan config:clear
        php artisan cache:clear
        echo "✅ APP_URL بروزرسانی و کش پاکسازی شد."

    # 14. ریستارت سرور
    - name: Restart Laravel server
      run: |
        pkill -f "php artisan serve" || true
        nohup php artisan serve --host=0.0.0.0 --port=8080 --no-reload > server.log 2>&1 &
        sleep 5

    # 15. اجرای سیدرها (اختیاری)
    - name: Run seeders (optional)
      run: php artisan db:seed --force --no-interaction || true

    # 16. نمایش اطلاعات نهایی
    - name: Show final info
      run: |
        echo "=========================================="
        echo "✅ سایت شما با موفقیت راه‌اندازی شد!"
        echo "=========================================="
        echo "🌐 آدرس دسترسی: $REMOTE_URL"
        echo "🔧 پورت اختصاص‌یافته: $REMOTE_PORT"
        echo "=========================================="
        echo "📝 نکات:"
        echo "  - این آدرس تا پایان اجرای اکشن فعال است"
        echo "  - برای مشاهده لاگ‌ها به بخش Actions مراجعه کنید"
        echo "  - لاگ‌های موجود: server.log و bore.log"
        echo "=========================================="

    # 17. نگهداشتن اکشن برای تست (تا ۲۰ دقیقه)
    - name: Keep server alive for testing
      run: |
        echo "⏳ سرور برای تست فعال است. آدرس دسترسی: $REMOTE_URL"
        echo "🔄 برای توقف تست، اکشن را دستی کنسل کنید."
        # استفاده از sleep برای نگه داشتن جاب بدون درگیری با tail
        sleep 14400